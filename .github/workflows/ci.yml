name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Set up JDK 11
        uses: actions/setup-java@v3
        with:
          java-version: '11'
          distribution: 'temurin'

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Start SUT
        run: java -jar artifacts/app-mbank.jar &

      - name: Wait for SUT to start
        run: |
          for i in {1..30}; do
            curl -s http://localhost:9999/ && break
            sleep 1
          done

      - name: Run Tests
        run: ./gradlew test